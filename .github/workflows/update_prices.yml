name: Update Crypto Prices

on:
  schedule:
    - cron: '0 * * * *' # Corre cada hora en punto
  workflow_dispatch:      # Botón para correrlo a mano desde GitHub

# ESTO ES LO QUE FALTABA:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run ETL
        run: python etl_script.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto_data.db crypto_etl.log
          git commit -m "Auto-update: precios actualizados [skip ci]" || exit 0
          git push